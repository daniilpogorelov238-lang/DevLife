<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevLife — Игры и код</title>
    <style>
        :root {
            --bg: #0f0f1a;
            --accent: #00ff9d;
            --text: #e0e0ff;
            --card: rgba(26, 26, 46, 0.95);
        }

        /* Светлая тема */
        .light-theme {
            --bg: #f4f6f9;
            --accent: #00b36b;
            --text: #1a1a2e;
            --card: rgba(255, 255, 255, 0.98);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.65;
            transition: background 0.4s, color 0.4s;
        }

        header, .contact-section, footer {
            transition: all 0.4s;
        }

        /* Остальные стили оставлены без изменений (как в предыдущей версии) */
        .navbar { max-width: 1300px; margin: 0 auto; padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 2.2rem; font-weight: 700; color: var(--accent); }
        .nav-links { display: flex; gap: 2.2rem; align-items: center; }
        .nav-links a { color: var(--text); text-decoration: none; font-weight: 500; }
        .nav-links a:hover { color: var(--accent); }

        .theme-toggle { background: none; border: none; font-size: 1.7rem; cursor: pointer; }

        .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; }
        .hamburger span { width: 30px; height: 3px; background: var(--accent); }

        .hero { height: 100vh; min-height: 620px; display: flex; align-items: center; justify-content: center; text-align: center; 
                 background: linear-gradient(rgba(15,15,26,0.85), rgba(15,15,26,0.85)), url('https://picsum.photos/1920/1080?random=42') center/cover; }
        .hero h1 { font-size: clamp(2.8rem, 8vw, 5rem); background: linear-gradient(90deg, var(--accent), #00ccff); 
                    -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .section { padding: 100px 5%; max-width: 1300px; margin: 0 auto; }
        .section-title { text-align: center; font-size: clamp(2.2rem, 6vw, 2.8rem); margin-bottom: 3.5rem; color: var(--accent); }

        .projects-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.8rem; }
        .project-card { background: var(--card); border-radius: 20px; overflow: hidden; transition: all 0.4s; }
        .project-card:hover { transform: translateY(-15px); box-shadow: 0 25px 50px rgba(0, 255, 157, 0.25); }
        .project-card img { width: 100%; height: 210px; object-fit: cover; }

        .play-btn { background: var(--accent); color: #0f0f1a; padding: 12px 28px; border-radius: 50px; text-decoration: none; font-weight: 600; display: inline-block; margin-top: 12px; }

        .contact-section { text-align: center; padding: 90px 5%; background: rgba(26, 26, 46, 0.6); }
        .contact-links { display: flex; justify-content: center; gap: 1.8rem; flex-wrap: wrap; }
        .contact-card { background: var(--card); padding: 22px 30px; border-radius: 18px; text-decoration: none; color: var(--text); min-width: 160px; }

        footer { background: #0a0a12; padding: 2.5rem 5%; text-align: center; border-top: 1px solid var(--accent); }

        @media (max-width: 768px) {
            .hamburger { display: flex; }
            .nav-links {
                position: fixed; top: 70px; left: -100%; width: 100%; height: calc(100vh - 70px);
                background: var(--bg); flex-direction: column; padding-top: 50px; gap: 2.5rem;
                font-size: 1.35rem; transition: 0.4s; z-index: 999;
            }
            .nav-links.active { left: 0; }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header>
        <div class="navbar">
            <div class="logo">DevLife</div>
            <div class="nav-links" id="navLinks">
                <a href="#about">Обо мне</a>
                <a href="#projects">Мои проекты</a>
                <a href="#contact">Связаться</a>
                <button class="theme-toggle" id="themeToggle">🌙</button>
            </div>
            <div class="hamburger" id="hamburger">
                <span></span><span></span><span></span>
            </div>
        </div>
    </header>

    <!-- Hero, About, Projects, Contact, Footer — без изменений (как в предыдущей версии) -->
    <!-- ... (вставь сюда остальной HTML из предыдущего сообщения) ... -->

    <script>
        const themeToggle = document.getElementById('themeToggle');
        const body = document.body;

        // Загрузка сохранённой темы
        function loadTheme() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light') {
                body.classList.add('light-theme');
                themeToggle.textContent = '☀️';
            } else {
                body.classList.remove('light-theme');
                themeToggle.textContent = '🌙';
            }
        }

        // Переключение темы
        themeToggle.addEventListener('click', () => {
            if (body.classList.contains('light-theme')) {
                body.classList.remove('light-theme');
                localStorage.setItem('theme', 'dark');
                themeToggle.textContent = '🌙';
            } else {
                body.classList.add('light-theme');
                localStorage.setItem('theme', 'light');
                themeToggle.textContent = '☀️';
            }
        });

        // Инициализация
        loadTheme();

        // Бургер-меню и прокрутка (без изменений)
        document.getElementById('hamburger').addEventListener('click', () => {
            document.getElementById('navLinks').classList.toggle('active');
        });

        document.querySelectorAll('a[href^="#"]').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                document.querySelector(link.getAttribute('href')).scrollIntoView({ behavior: 'smooth' });
                document.getElementById('navLinks').classList.remove('active');
            });
        });
    </script>
</body>
</html>
