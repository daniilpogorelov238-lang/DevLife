<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevLife — Игры и код</title>
    <style>
        :root {
            --bg: #0f0f1a;
            --accent: #00ff9d;
            --text: #e0e0ff;
            --card: rgba(26, 26, 46, 0.9);
        }

        @media (prefers-color-scheme: light) {
            :root {
                --bg: #f0f2f5;
                --accent: #00b36b;
                --text: #1a1a2e;
                --card: rgba(255, 255, 255, 0.95);
            }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            transition: all 0.4s;
        }

        header { /* ... (оставил без изменений) */ }
        /* (Все предыдущие стили оставил, чтобы не перегружать сообщение) */

        .contact-section {
            padding: 80px 20px;
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
            background: rgba(26, 26, 46, 0.6);
        }

        @media (prefers-color-scheme: light) {
            .contact-section { background: rgba(255, 255, 255, 0.7); }
        }

        .contact-title {
            font-size: 2.4rem;
            margin-bottom: 2rem;
            color: var(--accent);
        }

        .contact-links {
            display: flex;
            justify-content: center;
            gap: 2.5rem;
            flex-wrap: wrap;
            margin-top: 1rem;
        }

        .contact-card {
            background: var(--card);
            padding: 20px 30px;
            border-radius: 16px;
            text-decoration: none;
            color: var(--text);
            transition: all 0.3s;
            min-width: 160px;
        }

        .contact-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(0, 255, 157, 0.3);
        }

        .contact-card i {
            font-size: 2.8rem;
            margin-bottom: 12px;
            display: block;
        }

        /* Иконки */
        .tg { color: #229ED9; }
        .rossi { color: var(--accent); }
    </style>
</head>
<body>
    <!-- Header, Hero, About, Projects — без изменений -->

    <!-- === НОВЫЙ РАЗДЕЛ: СВЯЗАТЬСЯ === -->
    <section class="contact-section" id="contact">
        <h2 class="contact-title">Связаться со мной</h2>
        <p style="margin-bottom: 2rem; opacity: 0.9;">Буду рад общению и новым идеям!</p>
        
        <div class="contact-links">
            <!-- Telegram -->
            <a href="t.me/danya_portal" target="_blank" class="contact-card">
                <i class="tg">✈️</i>
                <strong>Telegram</strong>
                <p style="font-size: 0.95rem; margin-top: 8px; opacity: 0.8;">Написать быстро</p>
            </a>

            <!-- Rossi -->
            <a href="https://rossims.ru/c/daniil_pogorelov/" target="_blank" class="contact-card">
                <i class="rossi">R</i>
                <strong>Rossi</strong>
                <p style="font-size: 0.95rem; margin-top: 8px; opacity: 0.8;">Мессенджер</p>
            </a>
        </div>
    </section>

    <!-- Footer -->
    <footer style="background:#0a0a12; padding:3rem 2rem; text-align:center; border-top:1px solid var(--accent);">
        <div class="logo" style="font-size:2.2rem; margin-bottom:1rem; color:var(--accent);">DevLife</div>
        <p>Создано с ❤️ для удовольствия от программирования</p>
        <p style="opacity:0.6; font-size:0.9rem; margin-top: 1.5rem;">      
        </p>
    </footer>

    <script>
        // Бургер-меню + плавная прокрутка (как было)
        document.getElementById('hamburger').addEventListener('click', () => {
            document.getElementById('navLinks').classList.toggle('active');
        });

        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('cliсk', function(e) {
                if (this.getAttribute('href') !== '#') {
                    e.preventDefault();
                    document.querySelector(this.getAttribute('href')).scrollIntoView({ behavior: 'smooth' });
                }
            });
        });
    </script>
</body>
</html>
