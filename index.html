<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DevLife — Платформа разработчиков</title>

<link rel="icon" id="favicon" href="https://cdn-icons-png.flaticon.com/512/1055/1055687.png">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    scroll-behavior:smooth;
    font-family:Arial, sans-serif;
}

body{
    background:#050816;
    color:white;
    overflow-x:hidden;
}

/* ===== PRELOADER ===== */

#preloader{
    position:fixed;
    inset:0;
    background:#050816;
    z-index:99999;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    gap:20px;
    transition:1s;
}

.loader{
    width:90px;
    height:90px;
    border-radius:50%;
    border:6px solid #111;
    border-top:6px solid #00ffe1;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    100%{transform:rotate(360deg)}
}

/* ===== BACKGROUND ===== */

.bg{
    position:fixed;
    width:100%;
    height:100%;
    overflow:hidden;
    z-index:-1;
}

.circle{
    position:absolute;
    border-radius:50%;
    filter:blur(120px);
    opacity:.4;
    animation:float 12s infinite alternate;
}

.circle1{
    width:500px;
    height:500px;
    background:#00ffe1;
    top:-100px;
    left:-100px;
}

.circle2{
    width:500px;
    height:500px;
    background:#7a5cff;
    bottom:-100px;
    right:-100px;
}

@keyframes float{
    from{transform:translateY(0px)}
    to{transform:translateY(80px)}
}

/* ===== HEADER ===== */

header{
    width:100%;
    padding:20px 8%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    position:sticky;
    top:0;
    backdrop-filter:blur(20px);
    background:rgba(0,0,0,.2);
    z-index:1000;
}

.logo{
    font-size:35px;
    font-weight:bold;
    background:linear-gradient(45deg,#00ffe1,#7a5cff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

nav{
    display:flex;
    gap:20px;
}

nav a{
    color:white;
    text-decoration:none;
    transition:.3s;
}

nav a:hover{
    color:#00ffe1;
}

/* ===== HERO ===== */

.hero{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:40px;
    flex-direction:column;
}

.hero h1{
    font-size:80px;
    max-width:900px;
    line-height:1.1;
    animation:fadeUp 1s;
}

.hero p{
    margin-top:20px;
    font-size:20px;
    color:#ccc;
    max-width:700px;
    animation:fadeUp 1.4s;
}

.hero button{
    margin-top:40px;
    padding:18px 45px;
    border:none;
    border-radius:20px;
    background:linear-gradient(45deg,#00ffe1,#7a5cff);
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:.4s;
    box-shadow:0 0 30px rgba(0,255,225,.5);
}

.hero button:hover{
    transform:scale(1.07);
}

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(40px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* ===== POSTS ===== */

.container{
    width:100%;
    padding:100px 8%;
}

.section-title{
    font-size:45px;
    margin-bottom:50px;
    text-align:center;
}

.posts{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:30px;
}

.post{
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.1);
    border-radius:25px;
    overflow:hidden;
    backdrop-filter:blur(20px);
    transition:.5s;
}

.post:hover{
    transform:translateY(-10px);
    box-shadow:0 0 30px rgba(0,255,225,.2);
}

.post img,
.post video{
    width:100%;
    height:240px;
    object-fit:cover;
}

.post-content{
    padding:25px;
}

.post-content h2{
    margin-bottom:15px;
}

.post-content p{
    color:#ccc;
    line-height:1.6;
}

/* ===== ADMIN ===== */

.admin-btn{
    position:fixed;
    bottom:25px;
    right:25px;
    width:70px;
    height:70px;
    border-radius:50%;
    border:none;
    background:linear-gradient(45deg,#00ffe1,#7a5cff);
    color:white;
    font-size:30px;
    cursor:pointer;
    z-index:999;
}

.admin-panel{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.85);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:9999;
    padding:20px;
}

.admin-box{
    width:100%;
    max-width:700px;
    background:#0f1729;
    border-radius:30px;
    padding:30px;
    overflow-y:auto;
    max-height:90vh;
}

.admin-box h2{
    margin-bottom:20px;
}

.admin-box input,
.admin-box textarea,
.admin-box select{
    width:100%;
    margin-bottom:15px;
    padding:15px;
    border:none;
    border-radius:15px;
    background:#1a2542;
    color:white;
}

.admin-box button{
    width:100%;
    padding:16px;
    border:none;
    border-radius:15px;
    background:linear-gradient(45deg,#00ffe1,#7a5cff);
    color:white;
    cursor:pointer;
    font-size:16px;
}

.close{
    margin-top:10px;
    background:#ff3c6f !important;
}

.delete-btn{
    margin-top:15px;
    background:#ff3c6f !important;
}

/* ===== FOOTER ===== */

footer{
    padding:50px;
    text-align:center;
    color:#999;
}

/* ===== MOBILE ===== */

@media(max-width:768px){

.hero h1{
    font-size:45px;
}

.hero p{
    font-size:16px;
}

.section-title{
    font-size:35px;
}

header{
    padding:20px;
}

nav{
    display:none;
}

}
</style>
</head>

<body>

<div id="preloader">
    <div class="loader"></div>
    <h2>Загрузка DevLife...</h2>
</div>

<div class="bg">
    <div class="circle circle1"></div>
    <div class="circle circle2"></div>
</div>

<header>
    <div class="logo">DevLife</div>

    <nav>
        <a href="#">Главная</a>
        <a href="#posts">Проекты</a>
        <a href="#posts">Публикации</a>
    </nav>
</header>

<section class="hero">
    <h1>Публикуй проекты, посты, фото и видео</h1>

    <p>
        Современная платформа для разработчиков, дизайнеров и креаторов.
        Загружай свои работы и делись ими с миром.
    </p>

    <button onclick="scrollToPosts()">
        Смотреть публикации
    </button>
</section>

<section class="container" id="posts">
    <h1 class="section-title">Публикации</h1>

    <div class="posts" id="postsContainer">

    </div>
</section>

<footer>
    © 2026 DevLife — Все права защищены
</footer>

<button class="admin-btn" onclick="openAdmin()">⚡</button>

<!-- ADMIN -->

<div class="admin-panel" id="adminPanel">

    <div class="admin-box">

        <h2>Админ-панель</h2>

        <input type="password" id="password" placeholder="Введите пароль">

        <button onclick="loginAdmin()">Войти</button>

        <div id="adminContent" style="display:none; margin-top:25px;">

            <input type="text" id="title" placeholder="Название поста">

            <textarea id="description" placeholder="Описание"></textarea>

            <input type="text" id="media" placeholder="Ссылка на фото или видео">

            <select id="type">
                <option value="image">Фото</option>
                <option value="video">Видео</option>
            </select>

            <button onclick="addPost()">
                Опубликовать
            </button>

            <input type="text" id="iconInput" placeholder="Ссылка на иконку сайта">

            <button onclick="changeIcon()">
                Изменить иконку сайта
            </button>

        </div>

        <button class="close" onclick="closeAdmin()">
            Закрыть
        </button>

    </div>

</div>

<script>

/* ===== PRELOADER ===== */

window.onload = () => {
    setTimeout(()=>{
        document.getElementById("preloader").style.opacity="0";

        setTimeout(()=>{
            document.getElementById("preloader").style.display="none";
        },1000);

    },1500)
}

/* ===== SCROLL ===== */

function scrollToPosts(){
    document.getElementById("posts").scrollIntoView({
        behavior:"smooth"
    });
}

/* ===== ADMIN ===== */

const ADMIN_PASSWORD = "devlife";

function openAdmin(){
    document.getElementById("adminPanel").style.display="flex";
}

function closeAdmin(){
    document.getElementById("adminPanel").style.display="none";
}

function loginAdmin(){

    const pass = document.getElementById("password").value;

    if(pass === ADMIN_PASSWORD){

        document.getElementById("adminContent").style.display="block";

        alert("Вход выполнен!");

    }else{
        alert("Неверный пароль!");
    }

}

/* ===== POSTS ===== */

let posts = JSON.parse(localStorage.getItem("devlife_posts")) || [];

function savePosts(){
    localStorage.setItem("devlife_posts", JSON.stringify(posts));
}

function renderPosts(){

    const container = document.getElementById("postsContainer");

    container.innerHTML = "";

    posts.reverse().forEach((post,index)=>{

        const div = document.createElement("div");
        div.className = "post";

        div.innerHTML = `
            ${
                post.type === "image"
                ?
                `<img src="${post.media}" alt="">`
                :
                `<video controls src="${post.media}"></video>`
            }

            <div class="post-content">
                <h2>${post.title}</h2>
                <p>${post.description}</p>

                <button class="delete-btn" onclick="deletePost(${index})">
                    Удалить
                </button>
            </div>
        `;

        container.appendChild(div);

    });

}

function addPost(){

    const title = document.getElementById("title").value;
    const description = document.getElementById("description").value;
    const media = document.getElementById("media").value;
    const type = document.getElementById("type").value;

    if(!title || !description || !media){
        alert("Заполните все поля!");
        return;
    }

    posts.push({
        title,
        description,
        media,
        type
    });

    savePosts();
    renderPosts();

    alert("Пост опубликован!");

}

/* ===== DELETE ===== */

function deletePost(index){

    posts.splice(index,1);

    savePosts();
    renderPosts();

}

/* ===== CHANGE ICON ===== */

function changeIcon(){

    const icon = document.getElementById("iconInput").value;

    if(icon){

        document.getElementById("favicon").href = icon;

        localStorage.setItem("devlife_icon", icon);

        alert("Иконка изменена!");

    }

}

/* ===== LOAD ICON ===== */

const savedIcon = localStorage.getItem("devlife_icon");

if(savedIcon){
    document.getElementById("favicon").href = savedIcon;
}

renderPosts();

</script>

</body>
</html>
