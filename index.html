<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevLife — Игры и код</title>
    <style>
        :root {
            --bg: #0f0f1a;
            --accent: #00ff9d;
            --text: #e0e0ff;
            --card: rgba(26, 26, 46, 0.95);
        }

        .light-theme {
            --bg: #f4f6f9;
            --accent: #00b36b;
            --text: #1a1a2e;
            --card: rgba(255, 255, 255, 0.98);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.65;
            transition: background 0.5s;
        }

        header {
            background: rgba(15, 15, 26, 0.98);
            backdrop-filter: blur(12px);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
        }

        .navbar {
            max-width: 1300px;
            margin: 0 auto;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 2.3rem;
            font-weight: 700;
            background: linear-gradient(90deg, var(--accent), #00ccff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links { display: flex; gap: 2.2rem; align-items: center; }
        .nav-links a { color: var(--text); text-decoration: none; font-weight: 500; transition: 0.3s; }
        .nav-links a:hover { color: var(--accent); transform: translateY(-2px); }

        .theme-toggle { background: none; border: none; font-size: 1.7rem; cursor: pointer; }

        /* Hero с улучшенным CSS3 */
        .hero {
            height: 100vh;
            min-height: 650px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: linear-gradient(135deg, rgba(15,15,26,0.9), rgba(0, 40, 30, 0.8)), 
                        url('https://picsum.photos/1920/1080?random=42') center/cover;
            position: relative;
            overflow: hidden;
        }

        .hero::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, transparent 40%, rgba(0,255,157,0.1) 100%);
            animation: pulse 8s infinite alternate;
        }

        @keyframes pulse {
            from { opacity: 0.6; }
            to { opacity: 1; }
        }

        .hero h1 {
            font-size: clamp(3rem, 9vw, 5.5rem);
            margin-bottom: 1rem;
            background: linear-gradient(90deg, var(--accent), #00ccff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Секции */
        .section { padding: 110px 5%; max-width: 1300px; margin: 0 auto; }

        .section-title {
            text-align: center;
            font-size: clamp(2.3rem, 6vw, 3rem);
            margin-bottom: 4rem;
            color: var(--accent);
            position: relative;
        }

        .section-title::after {
            content: '';
            width: 80px;
            height: 3px;
            background: linear-gradient(to right, var(--accent), transparent);
            position: absolute;
            bottom: -12px;
            left: 50%;
            transform: translateX(-50%);
        }

        /* Навыки */
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 1.4rem;
        }

        .skill-card {
            background: var(--card);
            padding: 1.8rem 1rem;
            border-radius: 18px;
            text-align: center;
            transition: all 0.4s ease;
            border: 1px solid rgba(0, 255, 157, 0.1);
        }

        .skill-card:hover {
            transform: translateY(-12px) scale(1.05);
            box-shadow: 0 20px 40px rgba(0, 255, 157, 0.3);
            border-color: var(--accent);
        }

        /* Проекты */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(310px, 1fr));
            gap: 2rem;
        }

        .project-card {
            background: var(--card);
            border-radius: 22px;
            overflow: hidden;
            transition: all 0.5s ease;
            border: 1px solid rgba(0, 255, 157, 0.15);
        }

        .project-card:hover {
            transform: translateY(-18px);
            box-shadow: 0 30px 60px rgba(0, 255, 157, 0.35);
        }

        .project-card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            transition: transform 0.6s ease;
        }

        .project-card:hover img {
            transform: scale(1.08);
        }

        .play-btn {
            background: linear-gradient(90deg, var(--accent), #00cc7a);
            color: #0f0f1a;
            padding: 13px 32px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            display: inline-block;
            margin-top: 15px;
            transition: all 0.3s;
        }

        .play-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 10px 25px rgba(0, 255, 157, 0.4);
        }

        /* Контакты */
        .contact-section { text-align: center; padding: 100px 5%; background: rgba(26, 26, 46, 0.6); }
        .contact-links { display: flex; justify-content: center; gap: 2rem; flex-wrap: wrap; }
        .contact-card {
            background: var(--card);
            padding: 28px 40px;
            border-radius: 20px;
            text-decoration: none;
            color: var(--text);
            transition: all 0.4s;
        }
        .contact-card:hover { transform: scale(1.08); }

        footer { background: #0a0a12; padding: 3rem 5%; text-align: center; border-top: 1px solid var(--accent); }

        /* Мобильная адаптация */
        @media (max-width: 768px) {
            .hamburger { display: flex; }
            .nav-links {
                position: fixed; top: 70px; left: -100%; width: 100%; height: calc(100vh - 70px);
                background: var(--bg); flex-direction: column; padding-top: 60px; gap: 2.5rem;
                font-size: 1.4rem; transition: 0.4s; z-index: 999;
            }
            .nav-links.active { left: 0; }
        }
    </style>
</head>
<body>

    <!-- (Остальной HTML остаётся таким же, как в предыдущей версии) -->
    <!-- Header, Hero, About, Skills, Projects, Contact, Footer -->

    <script>
        // Тема
        const themeToggle = document.getElementById('themeToggle');
        const body = document.body;

        if (localStorage.getItem('theme') === 'light') {
            body.classList.add('light-theme');
            themeToggle.textContent = '☀️';
        } else {
            themeToggle.textContent = '🌙';
        }

        themeToggle.addEventListener('click', () => {
            body.classList.toggle('light-theme');
            const isLight = body.classList.contains('light-theme');
            themeToggle.textContent = isLight ? '☀️' : '🌙';
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
        });

        // Мобильное меню + прокрутка
        document.getElementById('hamburger').addEventListener('click', () => {
            document.getElementById('navLinks').classList.toggle('active');
        });

        document.querySelectorAll('a[href^="#"]').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                document.querySelector(link.getAttribute('href')).scrollIntoView({ behavior: 'smooth' });
                document.getElementById('navLinks').classList.remove('active');
            });
        });
    </script>
</body>
</html>
